<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kenaro's Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand fw-bold"
        href="/">
            Kenaro's Store
        </a>

        <div>

            <a href="/catalogo"
            class="btn btn-outline-light">
                Catálogo
            </a>

        </div>

    </div>
</nav>

<section class="bg-dark text-white text-center py-5">

    <div class="container">

        <h1 class="display-4">
            Bienvenido a Kenaro's Store
        </h1>

        <p class="lead">
            Tu tienda digital de videojuegos favoritos
        </p>

        <a href="/catalogo"
        class="btn btn-primary btn-lg">
            Explorar Catálogo
        </a>

    </div>

</section>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Productos Destacados
    </h2>

    <div class="row">

        <div class="col-md-3 mb-4"
            th:each="producto : ${productos}"
            th:if="${producto.id <= 4}">

            <div class="card h-100 shadow-sm">

                <img src="https://placehold.co/600x400"
                    class="card-img-top"
                    alt="Videojuego">

                <div class="card-body">

                    <h5 th:text="${producto.nombre}"></h5>

                    <p>

                        $<span th:text="${producto.precio}">
                        </span>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
