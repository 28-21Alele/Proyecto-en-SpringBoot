<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras - Kenaro's Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center w-100">
                <a class="navbar-brand fw-bold" href="/">
                    🎮 Kenaro's Store
                </a>
                <div class="d-flex gap-2">
                    <a href="/catalogo" class="btn btn-outline-light">
                        Catálogo
                    </a>
                    <a href="/carrito" class="btn btn-outline-light active">
                        🛒 Carrito
                        <span class="badge bg-danger" th:text="${cantidadCarrito}"></span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <h1 class="mb-4 fw-bold">
            Carrito de Compras
        </h1>

        <div th:if="${#lists.isEmpty(items)}" class="alert alert-info py-4 text-center">
            <h4>Tu carrito está vacío.</h4>
            <p class="mb-0 mt-2">¡Ve al catálogo para agregar tus videojuegos favoritos!</p>
        </div>

        <div th:if="${!#lists.isEmpty(items)}">
            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td class="fw-bold" th:text="${item.producto.nombre}"></td>
                        <td>$<span th:text="${item.producto.precio}"></span></td>
                        <td th:text="${item.cantidad}"></td>
                        <td class="fw-bold text-dark">$<span th:text="${item.subtotal}"></span></td>
                        <td>
                            <a th:href="@{/eliminar-carrito/{id}(id=${item.producto.id})}" class="btn btn-danger btn-sm">
                                🗑️ Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="text-end my-4">
                <h3 class="fw-bold">
                    Total: <span class="text-success">$<span th:text="${total}"></span></span>
                </h3>
            </div>

            <div class="d-flex gap-2">
                <a href="/catalogo" class="btn btn-primary px-4">
                    Seguir comprando
                </a>
                <a href="/vaciar-carrito" class="btn btn-warning px-4">
                    Vaciar carrito
                </a>
            </div>
        </div>

    </div>

</body>
</html>
