<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras - Kenaro's Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🎮 Kenaro's Store
        </a>

    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">
        Carrito de Compras
    </h1>

    <div th:if="${#lists.isEmpty(items)}"
        class="alert alert-info">

        Tu carrito está vacío.

    </div>

    <div th:if="${!#lists.isEmpty(items)}">

        <table class="table table-striped">

            <thead>

                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody>

                <tr th:each="item : ${items}">

                    <td th:text="${item.producto.nombre}">
                    </td>

                    <td>
                        $<span th:text="${item.producto.precio}">
                        </span>
                    </td>

                    <td th:text="${item.cantidad}">
                    </td>

                    <td>
                        $<span th:text="${item.subtotal}">
                        </span>
                    </td>

                    <td>

                        <a th:href="@{/eliminar-carrito/{id}(id=${item.producto.id})}"
                        class="btn btn-danger btn-sm">

                            Eliminar

                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

        <div class="text-end">

            <h3>

                Total:
                $<span th:text="${total}">
                </span>

            </h3>

        </div>

        <div class="mt-3">

            <a href="/catalogo"
            class="btn btn-primary">

                Seguir comprando

            </a>

            <a href="/vaciar-carrito"
            class="btn btn-warning">

                Vaciar carrito

            </a>

        </div>

    </div>

</div>

</body>
</html>
