<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center w-100">
                <a class="navbar-brand fw-bold" href="/">
                    🎮 Kenaro's Store
                </a>
                <div class="d-flex gap-2">
                    <a href="/catalogo" class="btn btn-outline-light">
                        Catálogo
                    </a>
                    <a href="/carrito" class="btn btn-outline-light">
                        🛒 Carrito
                        <span class="badge bg-danger" th:text="${cantidadCarrito}"></span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <a href="/catalogo" class="btn btn-secondary mb-3">
            ← Volver al catálogo
        </a>

    <div class="card shadow-lg border-0">
    <div class="row g-0">

        <div class="col-md-5">
            <img th:src="@{'/images/' + ${producto.imagen}}"
                class="img-fluid rounded-start"
                alt="Producto"
                style="height: 650px; width: 100%; object-fit: cover;">
        </div>

        <div class="col-md-7">

            <div class="card-body p-4">

                <h1 class="fw-bold"
                    th:text="${producto.nombre}">
                </h1>

                <p class="mt-3">
                    <span class="badge bg-secondary fs-6"
                        th:text="${producto.categoria.nombre}">
                    </span>
                </p>

                <hr>

                <h5>Descripción</h5>

                <p class="text-muted"
                th:text="${producto.descripcion}">
                </p>

                <h5>Disponibilidad</h5>

                <p>

                    <span class="badge bg-success fs-6"
                        th:text="${producto.stock + ' unidades'}">
                    </span>

                </p>

                <hr>

                <h2 class="text-success fw-bold">
                    $<span th:text="${producto.precio}"></span>
                </h2>

                <div class="mt-4 d-flex gap-2">

                    <a th:href="@{/agregar-carrito/{id}(id=${producto.id})}"
                    class="btn btn-success btn-lg">

                        🛒 Agregar al carrito

                    </a>

                    <a href="/catalogo"
                    class="btn btn-outline-secondary btn-lg">

                        Seguir comprando

                    </a>

                </div>

            </div>

        </div>

    </div>
</div>
