<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kenaro's Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center w-100">
                <a class="navbar-brand fw-bold" href="/">
                    🎮 Kenaro's Store
                </a>
                <div class="d-flex gap-2">
                    <a href="/catalogo" class="btn btn-outline-light">
                        Catálogo
                    </a>
                    <a href="/carrito" class="btn btn-outline-light">
                        🛒 Carrito
                        <span class="badge bg-danger" th:text="${cantidadCarrito}"></span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h1 class="text-center mb-4">
            Catálogo de Videojuegos
        </h1>
    
        <form action="/catalogo" method="get" class="row mb-4">
            <div class="col-md-4">
                <input type="text" name="nombre" class="form-control" placeholder="Buscar videojuego..." th:value="${nombre}">
            </div>

            <div class="col-md-4">
                <select name="categoriaId" class="form-select">
                    <option value="">Todas las categorías</option>
                    <option th:each="categoria : ${categorias}" 
                            th:value="${categoria.id}" 
                            th:text="${categoria.nombre}"
                            th:selected="${categoria.id == categoriaId}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    Buscar
                </button>
            </div>

            <div class="col-md-2">
                <a href="/catalogo" class="btn btn-secondary w-100">
                    Limpiar
                </a>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(productos)}" class="alert alert-warning">
            No se encontraron productos.
        </div>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="producto : ${productos}">
                <div class="card h-100 shadow-sm">
                    <img th:src="@{'/images/' + ${producto.imagen}}"
                            class="card-img-top"
                            alt="Videojuego"
                            style="height: 450px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" th:text="${producto.nombre}"></h5>
                        
                        <p class="card-text mb-1">
                            Categoría: 
                            <span class="badge bg-secondary" th:text="${producto.categoria.nombre}"></span>
                        </p>
                        
                        <p class="card-text mb-3">
                            Precio: 
                            <strong class="text-success">$<span th:text="${producto.precio}"></span></strong>
                        </p>

                        <div class="d-flex gap-2 mt-auto">
                            <a th:href="@{/producto/{id}(id=${producto.id})}" class="btn btn-primary flex-fill">
                                Ver detalle
                            </a>
                            <a th:href="@{/agregar-carrito/{id}(id=${producto.id})}" class="btn btn-success flex-fill">
                                🛒 Agregar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
